[project]
name = "dekapu-switch-bot"
version = "0.1.0"
description = "VRChat PoseTelemetryHUD 6DoF decoder + OSC feedback control"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "numpy>=2.1",
    "scipy>=1.13",
    "mss>=9.0",
    "python-osc>=1.9",
    "matplotlib>=3.8",
    "pydirectinput>=1.0.4",
]

[project.scripts]
decode-demo = "pose_hud.cli.decode_demo:main"
map-room = "pose_hud.cli.map_room:main"
find-button = "pose_hud.cli.find_button:main"
patrol-buttons = "pose_hud.cli.patrol_buttons:main"
probe-axes = "pose_hud.cli.probe_axes:main"
sim-face = "pose_hud.cli.sim_face:main"

[dependency-groups]
dev = ["pytest>=8.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pose_hud"]

[tool.pytest.ini_options]
testpaths = ["tests"]
