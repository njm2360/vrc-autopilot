version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      python-dev:
        dependency-type: development
      python-prod:
        dependency-type: production
